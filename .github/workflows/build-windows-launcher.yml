name: Build Windows Launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-launcher:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build EXE from PowerShell launcher
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module ps2exe -Scope CurrentUser -Force -AllowClobber -Repository PSGallery -Confirm:$false
          Invoke-ps2exe `
            -inputFile scripts/windows/Start-StockPlatform.ps1 `
            -outputFile StockTradingPlatform-Launcher.exe `
            -title "Stock Trading Platform Launcher" `
            -description "Installs dependencies, starts the local API and web app, and opens the browser." `
            -noConsole:$false

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockTradingPlatform-Launcher
          path: StockTradingPlatform-Launcher.exe

      - name: Attach launcher to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: StockTradingPlatform-Launcher.exe
